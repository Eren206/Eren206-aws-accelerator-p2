apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  # ⬇️ Bổ sung dòng định danh dự án vào đây ⬇️
  project: default
  source:
    repoURL: 'https://github.com/Eren206/Eren206-aws-accelerator-p2.git'
    path: cloud/w9/gitops/argocd/apps
  destination:
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true