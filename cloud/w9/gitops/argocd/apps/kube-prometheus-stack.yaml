# file: argocd/apps/kube-prometheus-stack.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: kube-prometheus-stack, namespace: argocd }
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      values: |
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleSelector: {}
            ruleNamespaceSelector: {}
        alertmanager:
          alertmanagerSpec:
            secrets:
              - gmail-secret        # 🌟 SỬA TẠI ĐÂY: Trỏ đúng con Secret Ty đã tạo ở namespace monitoring
          config:
            global:
              resolve_timeout: 5m
              smtp_smarthost: 'smtp.gmail.com:587'
              smtp_from: 'dinhvanty206@gmail.com'
              smtp_auth_username: 'dinhvanty206@gmail.com'
              smtp_auth_password_file: '/etc/alertmanager/secrets/gmail-secret/password'
              smtp_require_tls: true
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 10s       # Hạ xuống 10s để bài Lab test bắn mail nhanh hơn
              group_interval: 10s
              repeat_interval: 5m
              receiver: 'email-me'
            receivers:
              - name: 'email-me'
                email_configs:
                  - to: 'dinhvanty206@gmail.com'
                    send_resolved: true
              - name: 'null'
  destination: { server: https://kubernetes.default.svc, namespace: monitoring }
  syncPolicy: { automated: { prune: true, selfHeal: true },
                syncOptions: [CreateNamespace=true, ServerSideApply=true] }
