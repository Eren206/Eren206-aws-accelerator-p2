apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: w9-api-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Eren206/Eren206-aws-accelerator-p2.git'
    targetRevision: HEAD
    # 🌟 Chỉ đường cho ArgoCD tìm đến thư mục chứa file Rollout và ServiceMonitor của Ty
    path: cloud/w9/gitops/k8s-api 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Tự động tạo namespace demo nếu cụm chưa có