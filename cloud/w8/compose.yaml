services:
  backend:
    build:
      context: ./BE
      target: runtime
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      EHR_TABLE_NAME: ""
      DOCUMENTS_BUCKET_NAME: ""
      ANNOTATION_QUEUE_URL: ""
      DISABLE_LOCAL_MOCKS: "false"

  frontend:
    build:
      context: ./FE/EHR-frontend
      target: dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./FE/EHR-frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
