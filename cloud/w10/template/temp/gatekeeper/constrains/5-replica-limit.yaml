apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sReplicaLimits 
metadata:
  name: reject-deployment-high-replicas
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"] # Chỉ áp dụng bộ lọc lên tài nguyên Deployment
    namespaces:
      - demo 
  parameters:
    maxReplicas: 5