apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
	name: rbac
	namespace: argocd
spec:
	project: default
	source:
		repoURL: 'https://github.com/Eren206/Eren206-aws-accelerator-p2.git'
		path: 'cloud/w10/template/temp/rbac'
		targetRevision: HEAD
	destination:
		server: 'https://kubernetes.default.svc'
		namespace: default
	syncPolicy:
		automated:
			prune: true
			selfHeal: true
		syncOptions:
			- CreateNamespace=true

